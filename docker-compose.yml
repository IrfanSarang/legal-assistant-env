version: "3.9"

services:
  legal-assistant:
    build: .
    ports:
      - "7860:7860"
    environment:
      - API_BASE_URL=${API_BASE_URL:-https://router.huggingface.co/v1}
      - MODEL_NAME=${MODEL_NAME:-Qwen/Qwen2.5-72B-Instruct}
      - HF_TOKEN=${HF_TOKEN:-}
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app/app  # hot-reload for dev
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:7860/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
